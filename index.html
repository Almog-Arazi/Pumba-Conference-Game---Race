




<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pumba Game 2</title>
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <!-- Added Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #f1eff0;
        font-family: 'Rajdhani', sans-serif;
        touch-action: none; 
      }
      .font-cyber {
        font-family: 'Orbitron', sans-serif;
      }

      /* Custom Portfolio Gradient */
      .gradient-background {
        background: linear-gradient(300deg, #00bfff, #f1eff0, #1673ff);
        background-size: 180% 180%;
        animation: gradient-animation 18s ease infinite;
      }

      @keyframes gradient-animation {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      /* Swiper Custom Overrides for high-end feel */
      .swiper-pagination-bullet {
        background: white !important;
        opacity: 0.5;
      }
      .swiper-pagination-bullet-active {
        background: #00bfff !important; /* Cyan */
        opacity: 1;
        box-shadow: 0 0 10px #00bfff;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.553.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "@react-three/postprocessing": "https://aistudiocdn.com/@react-three/postprocessing@^3.0.4",
    "@react-three/fiber": "https://aistudiocdn.com/@react-three/fiber@^9.4.0",
    "zustand": "https://aistudiocdn.com/zustand@^5.0.8",
    "uuid": "https://aistudiocdn.com/uuid@^10.0.0",
    "@react-three/drei": "https://aistudiocdn.com/@react-three/drei@^10.7.7",
    "three": "https://aistudiocdn.com/three@^0.181.1",
    "postprocessing": "https://aistudiocdn.com/postprocessing@^6.38.0",
    "@mediapipe/tasks-vision": "https://aistudiocdn.com/@mediapipe/tasks-vision@0.10.14",
    "framer-motion": "https://esm.sh/framer-motion@11.0.3?external=react,react-dom",
    "swiper/react": "https://esm.sh/swiper@11.0.5/react?external=react,react-dom",
    "swiper/modules": "https://esm.sh/swiper@11.0.5/modules?external=react,react-dom",
    "swiper/": "https://esm.sh/swiper@11.0.5/?external=react,react-dom",
    "swiper": "https://esm.sh/swiper@^12.0.3"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="gradient-background">
    <div id="root">
      <!-- Static loader shown instantly before React mounts -->
      <div id="preloader" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000">
        <img src="/logo_2.svg" alt="Pumba" style="width:220px;animation:pulse-glow 2s ease-in-out infinite" />
        <div style="margin-top:40px;width:160px;height:3px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:40%;background:#00bfff;border-radius:4px;animation:loader-slide 1.2s ease-in-out infinite"></div>
        </div>
      </div>
      <style>
        @keyframes pulse-glow{0%,100%{opacity:1;filter:drop-shadow(0 0 12px rgba(0,191,255,0.4))}50%{opacity:.85;filter:drop-shadow(0 0 24px rgba(0,191,255,0.7))}}
        @keyframes loader-slide{0%{transform:translateX(-100%)}50%{transform:translateX(250%)}100%{transform:translateX(-100%)}}
      </style>
    </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
